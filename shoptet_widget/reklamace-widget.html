<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vrácení a reklamace | Proteinaco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- GT Flexa is proteinaco.cz primary font, Inter as fallback -->
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'GT Flexa', 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #292929;
            background: #f7f8fa;
            line-height: 1.6;
        }

        #reklamace-app {
            max-width: 640px;
            margin: 32px auto;
            padding: 0 16px;
        }

        /* ===== Typography ===== */
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
        h2 { font-size: 1.35rem; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
        h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; color: #333; }
        p { margin-bottom: 12px; }

        /* ===== Logo ===== */
        .widget-logo {
            text-align: center;
            margin-bottom: 24px;
        }

        .widget-logo img {
            max-height: 48px;
        }

        .widget-logo-text {
            font-size: 28px;
            font-weight: 800;
            color: #09A57C;
        }

        /* ===== Card ===== */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 32px;
            margin-bottom: 20px;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-decoration: none;
        }

        .btn-primary {
            background: #09A57C;
            color: #fff;
        }
        .btn-primary:hover { background: #15694a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(9,165,124,0.25); }
        .btn-primary:disabled { background: #a0c4b4; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            background: #fff;
            color: #09A57C;
            border: 2px solid #09A57C;
        }
        .btn-secondary:hover { background: #f0f9f5; transform: translateY(-1px); }

        .btn-outline {
            background: transparent;
            color: #555;
            border: 2px solid #ddd;
        }
        .btn-outline:hover { border-color: #aaa; color: #333; }

        .btn-choice {
            background: #fff;
            color: #333;
            border: 2px solid #e0e0e0;
            padding: 24px 28px;
            font-size: 1.15rem;
            margin-bottom: 12px;
            text-align: left;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .btn-choice:hover { border-color: #09A57C; background: #f0f9f5; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(9,165,124,0.12); }

        .btn-choice .btn-icon {
            font-size: 1.5rem;
            margin-right: 6px;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.875rem;
            width: auto;
        }

        .btn-link {
            background: none;
            border: none;
            color: #09A57C;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 0;
            font-size: 0.95rem;
            text-decoration: underline;
        }
        .btn-link:hover { color: #15694a; }

        /* ===== Forms ===== */
        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
            color: #444;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="number"],
        .form-group input[type="date"],
        .form-group input[type="tel"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
            color: #333;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #09A57C;
            box-shadow: 0 0 0 3px rgba(9,165,124,0.12);
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .form-group .hint {
            font-size: 0.82rem;
            color: #888;
            margin-top: 4px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
        }

        /* ===== Divider ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: #999;
            font-size: 0.9rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-top: 1px solid #e0e0e0;
        }

        /* ===== Checkbox / Radio items ===== */
        .item-card {
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s, background 0.2s;
        }
        .item-card.selected { border-color: #09A57C; background: #f0f9f5; }

        .item-header {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .item-header input[type="checkbox"],
        .item-header input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #09A57C;
            flex-shrink: 0;
        }

        .item-info { flex: 1; }
        .item-name { font-weight: 600; font-size: 1rem; }
        .item-meta { font-size: 0.85rem; color: #777; margin-top: 2px; }

        .item-fields {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #eee;
        }

        .item-fields .form-group { margin-bottom: 14px; }
        .item-fields .form-group:last-child { margin-bottom: 0; }

        /* ===== Radio group (resolution) ===== */
        .radio-group { display: flex; flex-direction: column; gap: 10px; }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .radio-option:hover { border-color: #ccc; }
        .radio-option.selected { border-color: #09A57C; background: #f0f9f5; }

        .radio-option input[type="radio"] {
            width: 18px;
            height: 18px;
            accent-color: #09A57C;
            flex-shrink: 0;
        }

        .radio-option span { font-size: 0.95rem; font-weight: 500; }

        /* ===== Photo Upload ===== */
        .upload-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 32px 20px;
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #09A57C;
            background: #f0f9f5;
            color: #09A57C;
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .upload-icon { font-size: 2rem; margin-bottom: 8px; display: block; }
        .upload-text { font-size: 0.95rem; margin-bottom: 4px; }
        .upload-hint { font-size: 0.82rem; color: #aaa; }

        .photo-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .photo-thumb {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }

        .photo-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-thumb .remove-photo {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .photo-thumb .remove-photo:hover { background: rgba(200,0,0,0.8); }

        /* ===== Loading ===== */
        .spinner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #09A57C;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== Error / Success ===== */
        .alert {
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }

        .alert-info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            color: #1e40af;
        }

        /* ===== Timeline ===== */
        .timeline { list-style: none; padding: 0; margin: 16px 0; }

        .timeline-item {
            display: flex;
            gap: 16px;
            padding-bottom: 20px;
            position: relative;
        }

        .timeline-item:last-child { padding-bottom: 0; }

        .timeline-dot-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 20px;
            flex-shrink: 0;
        }

        .timeline-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d0d0d0;
            border: 3px solid #e8e8e8;
            flex-shrink: 0;
            z-index: 1;
        }

        .timeline-dot.active {
            background: #09A57C;
            border-color: #b8e6d0;
        }

        .timeline-dot.current {
            background: #09A57C;
            border-color: #b8e6d0;
            box-shadow: 0 0 0 4px rgba(9,165,124,0.2);
        }

        .timeline-line {
            flex: 1;
            width: 2px;
            background: #e0e0e0;
            margin-top: 4px;
        }

        .timeline-line.active { background: #09A57C; }

        .timeline-item:last-child .timeline-line { display: none; }

        .timeline-content { flex: 1; padding-top: 0; }
        .timeline-date { font-size: 0.82rem; color: #999; }
        .timeline-text { font-weight: 500; font-size: 0.95rem; margin-top: 2px; }
        .timeline-note { font-size: 0.85rem; color: #666; margin-top: 2px; }

        /* ===== Status Badge ===== */
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-new { background: #dbeafe; color: #1e40af; }
        .status-waiting { background: #fef3c7; color: #92400e; }
        .status-inspecting { background: #e0e7ff; color: #3730a3; }
        .status-approved { background: #d1fae5; color: #065f46; }
        .status-rejected { background: #fee2e2; color: #991b1b; }
        .status-refund { background: #d1fae5; color: #065f46; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-resolved { background: #d1fae5; color: #065f46; }
        .status-info { background: #fef3c7; color: #92400e; }
        .status-assessing { background: #e0e7ff; color: #3730a3; }

        /* ===== Confirmation ===== */
        .confirmation-icon {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .steps-list {
            list-style: none;
            padding: 0;
            counter-reset: steps;
        }

        .steps-list li {
            counter-increment: steps;
            padding: 12px 0;
            padding-left: 40px;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }

        .steps-list li:last-child { border-bottom: none; }

        .steps-list li::before {
            content: counter(steps);
            position: absolute;
            left: 0;
            top: 12px;
            width: 28px;
            height: 28px;
            background: #09A57C;
            color: #fff;
            border-radius: 50%;
            font-size: 0.85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== Back nav ===== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #09A57C;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            margin-bottom: 20px;
            background: none;
            border: none;
            padding: 0;
        }
        .back-link:hover { color: #15694a; }

        /* ===== Section divider ===== */
        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
            margin-bottom: 14px;
            margin-top: 28px;
        }

        /* ===== Order info bar ===== */
        .order-bar {
            background: #f0f9f5;
            border: 1px solid #b8e6d0;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .order-bar strong { color: #09A57C; }

        /* ===== Footer ===== */
        .widget-footer {
            text-align: center;
            padding: 24px 0 16px;
            font-size: 0.82rem;
            color: #aaa;
            letter-spacing: 0.2px;
        }

        .widget-footer span {
            color: #09A57C;
            font-weight: 600;
        }

        /* ===== Modal ===== */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-backdrop.active { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 32px;
            max-width: 440px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            text-align: center;
        }
        .modal-box h3 { margin-bottom: 12px; font-size: 1.2rem; }
        .modal-box p { margin-bottom: 20px; color: #555; }
        .modal-box .case-code { color: #09A57C; font-weight: 700; }
        .modal-actions { display: flex; gap: 10px; flex-direction: column; }
        .modal-actions .btn { width: 100%; }

        /* ===== Responsive ===== */
        @media (max-width: 500px) {
            #reklamace-app { margin: 16px auto; }
            .card { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .btn-choice { padding: 20px 20px; font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div id="reklamace-app">
        <!-- App renders here -->
    </div>
    <div class="modal-backdrop" id="existing-case-modal">
        <div class="modal-box">
            <h3 id="modal-title">Existující případ</h3>
            <p id="modal-message"></p>
            <div class="modal-actions">
                <button class="btn btn-primary" id="modal-track-btn">Sledovat stav</button>
                <button class="btn btn-outline" id="modal-continue-btn">Pokračovat v novém podání</button>
            </div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';

        /* ===== Configuration ===== */
        const CONFIG = {
            // Production API on dedicated subdomain
            API_BASE: 'https://reklamace.proteinaco.com/api/v1/customer',
            MAX_PHOTOS: 5,
            MAX_PHOTO_SIZE_MB: 5,
        };

        /* ===== Label maps ===== */
        const STATUS_LABELS = {
            'new': 'Přijatá',
            'waiting_for_delivery': 'Zásilka na cestě k nám',
            'received_inspecting': 'Přijato na skladu \u2014 kontroluje se',
            'approved': 'Schváleno',
            'rejected': 'Zamítnuto',
            'refund_ready': 'Peníze připraveny k odeslání',
            'completed': 'Dokončeno',
            'waiting_for_assessment': 'Čeká na posouzení',
            'need_more_info': 'Čeká na doplnění informací',
            'assessing': 'Posuzuje se',
            'resolved': 'Vyřešená',
        };

        const STATUS_CSS = {
            'new': 'status-new',
            'waiting_for_delivery': 'status-waiting',
            'received_inspecting': 'status-inspecting',
            'approved': 'status-approved',
            'rejected': 'status-rejected',
            'refund_ready': 'status-refund',
            'completed': 'status-completed',
            'waiting_for_assessment': 'status-waiting',
            'need_more_info': 'status-info',
            'assessing': 'status-assessing',
            'resolved': 'status-resolved',
        };

        const RETURN_REASONS = [
            { value: 'ordered_wrong', label: 'Objednal/a jsem špatně' },
            { value: 'not_satisfied', label: 'Produkt mi nevyhovuje' },
            { value: 'other', label: 'Jiný důvod' },
        ];

        const RESOLUTION_OPTIONS = [
            { value: 'discount', label: 'Sleva na další nákup' },
            { value: 'new_product', label: 'Nový produkt' },
            { value: 'refund', label: 'Vrácení peněz' },
            { value: 'missing_product', label: 'Chybějící produkt v objednávce' },
            { value: 'other', label: 'Jiné řešení' },
        ];

        /* ===== State ===== */
        const state = {
            currentStep: 'landing',
            flowType: null,
            orderData: null,
            resultData: null,
            trackingData: null,
            trackingType: null,
            loading: false,
            error: null,
            // Return form state
            selectedItems: {},
            // Complaint form state
            selectedProduct: null,
            complaintPhotos: [],
            preferredResolution: 'refund',
            complaintProblemDesc: '',
            complaintDiscoveryDate: '',
            complaintDosesTaken: '',
            resolutionNote: '',
            // Contact fields
            contactName: '',
            contactPhone: '',
            contactBankAccount: '',
            // Lookup fields
            lookupOrderCode: '',
            lookupEmail: '',
            // Tracking fields
            trackCode: '',
            trackEmail: '',
        };

        /* ===== API helpers ===== */
        async function apiCall(method, path, body, isFormData) {
            state.loading = true;
            state.error = null;
            render();

            const url = CONFIG.API_BASE + path;
            const options = { method };

            if (isFormData) {
                options.body = body;
            } else if (body) {
                options.headers = { 'Content-Type': 'application/json' };
                options.body = JSON.stringify(body);
            }

            try {
                const resp = await fetch(url, options);
                const data = await resp.json();
                if (!resp.ok) {
                    throw new Error(data.detail || 'Nastala chyba. Zkuste to prosím znovu.');
                }
                return data;
            } catch (err) {
                if (err instanceof TypeError) {
                    throw new Error('Nepodařilo se spojit se serverem. Zkontrolujte připojení k internetu.');
                }
                throw err;
            } finally {
                state.loading = false;
            }
        }

        /* ===== Helpers ===== */
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
        }

        function formatDateTime(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('cs-CZ', {
                day: 'numeric', month: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit',
            });
        }

        function getStatusLabel(status) {
            return STATUS_LABELS[status] || status;
        }

        function getStatusCss(status) {
            return STATUS_CSS[status] || 'status-new';
        }

        /* ===== Validation ===== */
        function validateEmail(email) {
            return email && email.includes('@') && email.includes('.');
        }

        function validateRequired(value) {
            return value && value.trim().length > 0;
        }

        /* ===== Logo HTML ===== */
        function renderLogo() {
            return `
                <div class="widget-logo">
                    <img src="https://cdn.myshoptet.com/usr/www.proteinaco.cz/user/logos/logo-proteinco.svg"
                         alt="Protein a Co"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <div class="widget-logo-text" style="display:none; font-weight:800; font-size:24px; color:#292929;">:Protein a Co</div>
                </div>
            `;
        }

        /* ===== Footer HTML ===== */
        function renderFooter() {
            return `
                <div class="widget-footer">
                    <span>Proteinaco.cz</span> &mdash; Vaše zdraví, náš závazek
                </div>
            `;
        }

        /* ===== Render engine ===== */
        function render() {
            const app = document.getElementById('reklamace-app');
            let html = '';

            if (state.loading) {
                html += '<div class="spinner-overlay"><div class="spinner"></div></div>';
            }

            html += renderLogo();

            switch (state.currentStep) {
                case 'landing':
                    html += renderLanding();
                    break;
                case 'lookup':
                    html += renderLookup();
                    break;
                case 'return-form':
                    html += renderReturnForm();
                    break;
                case 'complaint-form':
                    html += renderComplaintForm();
                    break;
                case 'confirmation':
                    html += renderConfirmation();
                    break;
                case 'tracking':
                    html += renderTracking();
                    break;
            }

            html += renderFooter();

            app.innerHTML = html;
            attachEventListeners();
        }

        /* ===== Step renderers ===== */

        function renderLanding() {
            return `

        function renderTracking() {
            const data = state.trackingData;
            if (!data) return '';

            const isReturn = state.trackingType === 'return';
            const typeLabel = isReturn ? 'Vrácení' : 'Reklamace';

            /* Build timeline from status_history */
            const history = data.status_history || [];
            const timelineHtml = history.map((entry, idx) => {
                const isLast = idx === history.length - 1;
                return `
                    <li class="timeline-item">
                        <div class="timeline-dot-col">
                            <div class="timeline-dot ${isLast ? 'current' : 'active'}"></div>
                            <div class="timeline-line active"></div>
                        </div>
                        <div class="timeline-content">
                            <div class="timeline-date">${formatDateTime(entry.created_at)}</div>
                            <div class="timeline-text">${escapeHtml(getStatusLabel(entry.new_status))}</div>
                            ${entry.note ? `<div class="timeline-note">${escapeHtml(entry.note)}</div>` : ''}
                        </div>
                    </li>
                `;
            }).join('');

            /* Items */
            const itemsHtml = (data.items || []).map(item => `
                <div style="padding:10px 0; border-bottom:1px solid #f0f0f0;">
                    <strong>${escapeHtml(item.product_name)}</strong>
                    <span style="color:#888;"> &middot; ${item.quantity} ks</span>
                    ${item.problem_description ? `<div style="font-size:0.9rem; color:#666; margin-top:4px;">${escapeHtml(item.problem_description)}</div>` : ''}
                    ${item.reason ? `<div style="font-size:0.9rem; color:#666; margin-top:4px;">Důvod: ${escapeHtml(RETURN_REASONS.find(r => r.value === item.reason)?.label || item.reason)}</div>` : ''}
                </div>

            /* Need more info? Show supplement form */
            const needInfo = data.status === 'need_more_info';

            return `
                <button class="back-link" data-action="go-landing">&#x2190; Zpět</button>

                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:20px;">
                        <div>
                            <h2 style="margin-bottom:4px;">${typeLabel}: ${escapeHtml(data.code)}</h2>
                            <div style="color:#666; font-size:0.9rem;">Vytvořeno: ${formatDate(data.created_at)}</div>

                    </div>

                    ${state.error ? `<div class="alert alert-error">${escapeHtml(state.error)}</div>` : ''}

                    ${needInfo ? `
                    <div class="alert alert-info" style="margin-bottom:20px;">
                        Čekáme na vaše doplnění informací. Odpovězte prosím níže.
                    </div>

                    <div class="form-group">
                        <label for="supplement-msg">Vaše zpráva</label>

                        Odeslat doplnění

                    <div class="card" style="text-align:center; background:#f0f9f5; border:2px solid #09A57C; margin-bottom:20px;">
                        <p style="font-size:0.9rem; color:#666; margin-bottom:4px;">Váš slevový kupón:</p>
                        <p style="font-size:1.5rem; font-weight:800; color:#09A57C; letter-spacing:2px; margin-bottom:4px;">
                            ${escapeHtml(data.coupon_code)}
                        </p>
                        <p style="font-size:0.85rem; color:#888;">Použijte při dalším nákupu v košíku.</p>
                    </div>
                    ` : ''}

                    ${(isReturn || data.has_label) && !data.coupon_code ? `
                    <div style="margin-bottom:20px;">
                        <a href="/api/v1/customer/${isReturn ? 'returns' : 'complaints'}/${encodeURIComponent(data.code)}/label"
                           class="btn btn-secondary" target="_blank"
                           style="display:inline-flex; align-items:center; gap:8px;">

                    <h3>Položky</h3>
                    ${itemsHtml}

                    <h3 style="margin-top:24px;">Průběh</h3>

        /* ===== Event attachment ===== */
        function attachEventListeners() {
            /* Delegate all clicks */
            document.querySelectorAll('[data-action]').forEach(el => {
                const action = el.getAttribute('data-action');

                switch (action) {
                    case 'start-return':
                        el.addEventListener('click', () => {
                            state.flowType = 'return';
                            state.currentStep = 'lookup';
                            state.error = null;
                            render();
                        });
                        break;

                    case 'start-complaint':
                        el.addEventListener('click', () => {
                            state.flowType = 'complaint';
                            state.currentStep = 'lookup';
                            state.error = null;
                            render();
                        });
                        break;

                    case 'go-landing':
                        el.addEventListener('click', () => {
                            state.currentStep = 'landing';
                            state.error = null;
                            render();
                        });
                        break;

                    case 'go-lookup':
                        el.addEventListener('click', () => {
                            state.currentStep = 'lookup';
                            state.error = null;
                            render();
                        });
                        break;

                    case 'lookup-order':
                        el.addEventListener('click', handleLookupOrder);
                        break;

                    case 'track':
                        el.addEventListener('click', handleTrack);
                        break;

                    case 'toggle-item':
                        el.addEventListener('change', (e) => handleToggleItem(e, el));
                        break;

                    case 'item-qty':
                        el.addEventListener('change', (e) => {
                            const idx = el.getAttribute('data-idx');
                            if (state.selectedItems[idx]) {
                                state.selectedItems[idx].quantity = parseInt(e.target.value);
                            }
                        });
                        break;

                    case 'item-reason':
                        el.addEventListener('change', (e) => {
                            const idx = el.getAttribute('data-idx');
                            if (state.selectedItems[idx]) {
                                state.selectedItems[idx].reason = e.target.value;
                            }
                        });
                        break;

                    case 'item-comment':
                        el.addEventListener('input', (e) => {
                            const idx = el.getAttribute('data-idx');
                            if (state.selectedItems[idx]) {
                                state.selectedItems[idx].comment = e.target.value;
                            }
                        });
                        break;

                    case 'select-product':
                        el.addEventListener('change', () => {
                            state.selectedProduct = parseInt(el.getAttribute('data-idx'));
                            render();
                        });
                        break;

                    case 'select-resolution':
                        el.addEventListener('change', () => {
                            state.preferredResolution = el.value;
                            render();
                        });
                        break;

                    case 'remove-photo':
                        el.addEventListener('click', () => {
                            const idx = parseInt(el.getAttribute('data-idx'));
                            state.complaintPhotos.splice(idx, 1);
                            render();
                        });
                        break;

                    case 'submit-return':
                        el.addEventListener('click', handleSubmitReturn);
                        break;

                    case 'submit-complaint':
                        el.addEventListener('click', handleSubmitComplaint);
                        break;

                    case 'submit-supplement':
                        el.addEventListener('click', handleSubmitSupplement);
                        break;

                    case 'go-tracking-from-confirm':
                        el.addEventListener('click', () => {
                            const code = state.resultData?.code;
                            const email = state.lookupEmail;
                            if (code && email) {
                                state.trackCode = code;
                                state.trackEmail = email;
                                handleTrack();
                            }
                        });
                        break;
                }
            });

            /* File input and drag & drop */
            const fileInput = document.getElementById('file-input');
            const uploadZone = document.getElementById('upload-zone');

            if (fileInput) {
                fileInput.addEventListener('change', handleFileSelect);
            }

            if (uploadZone) {
                uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadZone.classList.add('dragover');
                });
                uploadZone.addEventListener('dragleave', () => {
                    uploadZone.classList.remove('dragover');
                });
                uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadZone.classList.remove('dragover');
                    handleFileDrop(e.dataTransfer.files);
                });
            }

            /* Sync input values on input events */
            const trackCodeEl = document.getElementById('track-code');
            const trackEmailEl = document.getElementById('track-email');
            const lookupOrderEl = document.getElementById('lookup-order');
            const lookupEmailEl = document.getElementById('lookup-email');
            const contactNameEl = document.getElementById('contact-name');
            const contactPhoneEl = document.getElementById('contact-phone');
            const contactBankEl = document.getElementById('contact-bank');

            if (trackCodeEl) trackCodeEl.addEventListener('input', (e) => { state.trackCode = e.target.value; });
            if (trackEmailEl) trackEmailEl.addEventListener('input', (e) => { state.trackEmail = e.target.value; });
            if (lookupOrderEl) lookupOrderEl.addEventListener('input', (e) => { state.lookupOrderCode = e.target.value; });
            if (lookupEmailEl) lookupEmailEl.addEventListener('input', (e) => { state.lookupEmail = e.target.value; });
            if (contactNameEl) contactNameEl.addEventListener('input', (e) => { state.contactName = e.target.value; });
            if (contactPhoneEl) contactPhoneEl.addEventListener('input', (e) => { state.contactPhone = e.target.value; });
            if (contactBankEl) contactBankEl.addEventListener('input', (e) => { state.contactBankAccount = e.target.value; });

            const problemDescEl = document.getElementById('problem-desc');
            const discoveryDateEl = document.getElementById('discovery-date');
            const dosesTakenEl = document.getElementById('doses-taken');
            if (problemDescEl) problemDescEl.addEventListener('input', (e) => { state.complaintProblemDesc = e.target.value; });
            if (discoveryDateEl) discoveryDateEl.addEventListener('input', (e) => { state.complaintDiscoveryDate = e.target.value; });
            if (dosesTakenEl) dosesTakenEl.addEventListener('input', (e) => { state.complaintDosesTaken = e.target.value; });

            const resolutionNoteEl = document.getElementById('resolution-note');
            if (resolutionNoteEl) resolutionNoteEl.addEventListener('input', (e) => { state.resolutionNote = e.target.value; });
        }

        /* ===== Action handlers ===== */

        async function handleLookupOrder() {
            /* Read current input values */
            const orderCode = state.lookupOrderCode.trim();
            const email = state.lookupEmail.trim();

            if (!orderCode) {
                state.error = 'Zadejte číslo objednávky.';
                render();
                return;
            }
            if (!validateEmail(email)) {
                state.error = 'Zadejte platný e-mail.';
                render();
                return;
            }

            try {
                const data = await apiCall('POST', '/lookup-order', {
                    order_code: orderCode,
                    email: email,
                });

                state.orderData = data;
                state.selectedItems = {};
                state.selectedProduct = null;
                state.complaintPhotos = [];
                state.contactName = data.customer_name || '';
                state.error = null;

                /* Check for existing active cases — show modal if any exist */
                const existingCases = [];
                if (data.existing_return_code) {
                    existingCases.push({ code: data.existing_return_code, type: 'return', label: 'vrácení zboží' });
                }
                if (data.existing_complaint_code) {
                    existingCases.push({ code: data.existing_complaint_code, type: 'complaint', label: 'reklamace' });
                }

                if (existingCases.length > 0) {
                    showExistingCaseModal(existingCases, email);
                    return;
                }

                if (state.flowType === 'return') {
                    state.currentStep = 'return-form';
                } else {
                    state.currentStep = 'complaint-form';
                }
            } catch (err) {
                state.error = err.message;
            }

            render();
        }

        async function handleTrack() {
            const code = state.trackCode.trim();
            const email = state.trackEmail.trim();

            if (!code) {
                state.error = 'Zadejte číslo případu.';
                render();
                return;
            }
            if (!validateEmail(email)) {
                state.error = 'Zadejte platný e-mail.';
                render();
                return;
            }

            /* Determine type from prefix: RV = return, RK = complaint */
            const isReturn = code.toUpperCase().startsWith('RV');
            const isComplaint = code.toUpperCase().startsWith('RK');

            if (!isReturn && !isComplaint) {
                /* Try both endpoints */
                try {
                    const data = await apiCall('GET', `/returns/${encodeURIComponent(code)}?email=${encodeURIComponent(email)}`);
                    state.trackingData = data;
                    state.trackingType = 'return';
                    state.currentStep = 'tracking';
                    state.error = null;
                    render();
                    return;
                } catch (e) {
                    /* Fall through to try complaints */
                }

                try {
                    const data = await apiCall('GET', `/complaints/${encodeURIComponent(code)}?email=${encodeURIComponent(email)}`);
                    state.trackingData = data;
                    state.trackingType = 'complaint';
                    state.currentStep = 'tracking';
                    state.error = null;
                    render();
                    return;
                } catch (e) {
                    state.error = 'Případ nebyl nalezen. Zkontrolujte číslo a e-mail.';
                    render();
                    return;
                }
            }

            const endpoint = isReturn
                ? `/returns/${encodeURIComponent(code)}?email=${encodeURIComponent(email)}`
                : `/complaints/${encodeURIComponent(code)}?email=${encodeURIComponent(email)}`;

            try {
                const data = await apiCall('GET', endpoint);
                state.trackingData = data;
                state.trackingType = isReturn ? 'return' : 'complaint';
                state.currentStep = 'tracking';
                state.error = null;
            } catch (err) {
                state.error = err.message;
            }

            render();
        }

        function handleToggleItem(e, el) {
            const idx = el.getAttribute('data-idx');
            if (e.target.checked) {
                const item = state.orderData.items[idx];
                state.selectedItems[idx] = {
                    product_code: item.product_code,
                    quantity: item.quantity,
                    reason: 'not_satisfied',
                    comment: '',
                };
            } else {
                delete state.selectedItems[idx];
            }
            render();
        }

        async function handleSubmitReturn() {
            /* Gather contact from current DOM values */
            syncContactFields();

            const name = state.contactName.trim();

            if (!name) {
                state.error = 'Vyplňte jméno a příjmení.';
                render();
                return;
            }

            const items = Object.values(state.selectedItems).map(sel => ({
                product_code: sel.product_code,
                quantity: sel.quantity,
                reason: sel.reason,
                comment: sel.comment || null,
            }));

            if (items.length === 0) {
                state.error = 'Vyberte alespoň jednu položku k vrácení.';
                render();
                return;
            }

            try {
                const data = await apiCall('POST', '/returns', {
                    order_code: state.orderData.order_code,
                    email: state.lookupEmail,
                    name: name,
                    phone: state.contactPhone || null,
                    bank_account: state.contactBankAccount || null,
                    items: items,
                });

                state.resultData = data;
                state.currentStep = 'confirmation';
                state.error = null;
            } catch (err) {
                if (await handleExistingCaseError(err.message, 'return')) return;
                state.error = err.message;
            }

            render();
        }

        async function handleSubmitComplaint() {
            syncContactFields();

            const name = state.contactName.trim();
            const problemDesc = state.complaintProblemDesc.trim();
            const discoveryDate = state.complaintDiscoveryDate || null;
            const dosesTaken = state.complaintDosesTaken;

            if (!name) {
                state.error = 'Vyplňte jméno a příjmení.';
                render();
                return;
            }

            if (state.selectedProduct === null) {
                state.error = 'Vyberte reklamovaný produkt.';
                render();
                return;
            }

            if (!problemDesc) {
                state.error = 'Popište problém s produktem.';
                render();
                return;
            }

            const product = state.orderData.items[state.selectedProduct];

            const complaintItem = {
                product_code: product.product_code,
                quantity: 1,
                problem_description: problemDesc,
                preferred_resolution: state.preferredResolution,
            };

            if (discoveryDate) complaintItem.discovery_date = discoveryDate;
            if (dosesTaken) complaintItem.doses_taken = parseInt(dosesTaken);

            try {
                const data = await apiCall('POST', '/complaints', {
                    order_code: state.orderData.order_code,
                    email: state.lookupEmail,
                    name: name,
                    phone: state.contactPhone || null,
                    bank_account: state.contactBankAccount || null,
                    resolution_note: state.resolutionNote || null,
                    items: [complaintItem],
                });

                state.resultData = data;

                /* Upload photos if any */
                if (state.complaintPhotos.length > 0) {
                    await uploadPhotos(data.code);
                }

                state.currentStep = 'confirmation';
                state.error = null;
            } catch (err) {
                if (await handleExistingCaseError(err.message, 'complaint')) return;
                state.error = err.message;
            }

            render();
        }

        /* Handle EXISTING:{code}|message errors — redirect to tracking */
        async function handleExistingCaseError(msg, type) {
            if (!msg || !msg.startsWith('EXISTING:')) return false;
            const parts = msg.substring('EXISTING:'.length).split('|', 2);
            const code = parts[0];
            state.trackCode = code;
            state.trackEmail = state.lookupEmail;
            state.trackingType = type;
            await handleTrack();
            return true;
        }

        function showExistingCaseModal(cases, email) {
            const modal = document.getElementById('existing-case-modal');
            const title = document.getElementById('modal-title');
            const msg = document.getElementById('modal-message');
            const trackBtn = document.getElementById('modal-track-btn');
            const continueBtn = document.getElementById('modal-continue-btn');

            const lines = cases.map(c =>
                `<strong class="case-code">${escapeHtml(c.code)}</strong> (${escapeHtml(c.label)})`
            ).join('<br>');

            title.textContent = 'Existující případ';
            msg.innerHTML = `Pro tuto objednávku již existuje:<br>${lines}<br><br>Jak chcete pokračovat?`;

            // Track button — go to first existing case
            trackBtn.onclick = async () => {
                modal.classList.remove('active');
                state.trackCode = cases[0].code;
                state.trackEmail = email;
                await handleTrack();
            };

            // Continue button — dismiss and show form
            continueBtn.onclick = () => {
                modal.classList.remove('active');
                if (state.flowType === 'return') {
                    state.currentStep = 'return-form';
                } else {
                    state.currentStep = 'complaint-form';
                }
                render();
            };

            modal.classList.add('active');
        }

        async function uploadPhotos(complaintCode) {
            const formData = new FormData();
            formData.append('email', state.lookupEmail);

            for (const photo of state.complaintPhotos) {
                formData.append('files', photo.file, photo.file.name);
            }

            try {
                await apiCall('POST', `/complaints/${encodeURIComponent(complaintCode)}/photos`, formData, true);
            } catch (err) {
                /* Non-blocking: complaint already created, photos failed */
                console.error('Photo upload failed:', err);
            }
        }

        async function handleSubmitSupplement() {
            const msg = document.getElementById('supplement-msg')?.value?.trim();
            if (!msg) {
                state.error = 'Napište zprávu.';
                render();
                return;
            }

            const code = state.trackingData.code;
            const email = state.trackEmail;

            try {
                await apiCall('POST', `/complaints/${encodeURIComponent(code)}/supplement`, {
                    email: email,
                    message: msg,
                });

                /* Refresh tracking data */
                const data = await apiCall('GET', `/complaints/${encodeURIComponent(code)}?email=${encodeURIComponent(email)}`);
                state.trackingData = data;
                state.error = null;
            } catch (err) {
                state.error = err.message;
            }

            render();
        }

        /* ===== File handling ===== */

        function handleFileSelect(e) {
            processFiles(e.target.files);
        }

        function handleFileDrop(files) {
            processFiles(files);
        }

        function processFiles(fileList) {
            const remaining = CONFIG.MAX_PHOTOS - state.complaintPhotos.length;
            const files = Array.from(fileList).slice(0, remaining);

            for (const file of files) {
                if (!file.type.startsWith('image/')) {
                    state.error = `Soubor "${file.name}" není obrázek.`;
                    render();
                    return;
                }

                if (file.size > CONFIG.MAX_PHOTO_SIZE_MB * 1024 * 1024) {
                    state.error = `Soubor "${file.name}" je příliš velký (max ${CONFIG.MAX_PHOTO_SIZE_MB} MB).`;
                    render();
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    state.complaintPhotos.push({
                        file: file,
                        preview: e.target.result,
                    });
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        /* ===== Sync helpers ===== */

        function syncContactFields() {
            const nameEl = document.getElementById('contact-name');
            const phoneEl = document.getElementById('contact-phone');
            const bankEl = document.getElementById('contact-bank');

            if (nameEl) state.contactName = nameEl.value;
            if (phoneEl) state.contactPhone = phoneEl.value;
            if (bankEl) state.contactBankAccount = bankEl.value;
        }

        /* ===== Init ===== */
        render();

    })();
    </script>
</body>
</html>
